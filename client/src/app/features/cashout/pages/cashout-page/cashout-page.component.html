<main>
  <h1>Cashed out</h1>

  <p>
    Final payout:
    <strong>
      {{
        sessionStore
          .session()
          ?.cashedOutCredits ?? 0
      }}
    </strong>
    credits
  </p>

  <button
    type="button"
    [disabled]="sessionStore.pending()"
    (click)="startNewGame()"
  >
    @if (sessionStore.pending()) {
      Clearing…
    } @else {
      Start a new game
    }
  </button>

  @if (
    sessionStore.error();
    as error
  ) {
    <p role="alert">
      {{ error }}
    </p>
  }
</main>
