<main class="welcome-page">
  <section class="welcome-page__card">
    <p class="welcome-page__eyebrow">
      Welcome to
    </p>

    <h1 class="welcome-page__title">
      Casino Jackpot
    </h1>

    <div
      class="welcome-page__chips"
      aria-hidden="true"
    >
      <span>10</span>
      <span>★</span>
      <span>10</span>
    </div>

    <p class="welcome-page__description">
      Start with 10 credits.
      Match three symbols and chase
      the jackpot.
    </p>

    <button
      type="button"
      class="welcome-page__button"
      [disabled]="sessionStore.pending()"
      (click)="startGame()"
    >
      @if (sessionStore.pending()) {
        Opening table…
      } @else {
        Start game
      }
    </button>

    @if (
      sessionStore.error();
      as error
    ) {
      <p
        class="welcome-page__error"
        role="alert"
      >
        {{ error }}
      </p>
    }
  </section>
</main>
