<div
  class="modal"
  role="presentation"
  (click)="close()"
>
  <section
    class="modal__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="win-title"
    (click)="keepOpen($event)"
  >
    <div
      class="modal__sparkles"
      aria-hidden="true"
    >
      ★ ✦ ★
    </div>

    <h2
      id="win-title"
      class="modal__title"
    >
      Jackpot!
    </h2>

    <p class="modal__message">
      You won
      <strong>
        {{ reward() }}
      </strong>
      credits
    </p>

    <button
      autofocus
      type="button"
      class="modal__button"
      (click)="close()"
    >
      Keep playing
    </button>
  </section>
</div>
